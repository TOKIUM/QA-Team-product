api:
  auth:
    token_env: API_KEY
    type: bearer
  base_url: https://dev.keihi.com/api/v2
custom_tests:
- expected_status: 200
  method: GET
  name: health-check
  url_path: payment_requests/reports
  use_auth: true
- expected_status: 200
  method: GET
  name: get-reports
  url_path: payment_requests/reports
  use_auth: true
- expected_status: 401
  method: GET
  name: get-reports-no-auth
  url_path: payment_requests/reports
  use_auth: false
- expected_status: 200
  method: GET
  name: get-reports-with-sort
  query_params:
    amount_from: 1000
  request_body:
    sort:
    - key: due_at
      order: asc
  url_path: payment_requests/reports
  use_auth: true
notification:
  slack:
    on_failure_only: true
    webhook_url: ''
output:
  json_indent: 4
  results_dir: results
test:
  boundary:
    api_overrides:
      groups:
        negative_expected_status: 500
        offset_negative_expected_status: 500
      members:
        overflow_expected_status: 200
      posts:
        zero_expected_status: 400
      projects:
        zero_expected_status: 400
    offset_large_expected_status: 200
    offset_large_value: 999999
    offset_negative_expected_status: 400
    overflow_expected_status: 400
  concurrency: 3
  crud_chain:
    api_overrides: {}
    delete_expected_status: 200
    delete_url_pattern: '{url_path}/{id}'
    enabled: false
    id_field: id
    post_expected_status: 200
    verify_delete_expected_status: 404
  delete_normal:
    api_overrides: {}
    # individual_only: []    # --api 指定時のみ実行する API（全実行時はスキップ）
    # data_comparison:       # 未設定時は post_normal.data_comparison にフォールバック
    #   enabled: true
    #   get_endpoints: {}
    expected_status: 200
  error_body_validation: true
  invalid_body:
    api_overrides: {}
    expected_status: 400
  methods:
  - GET
  - POST
  missing_required:
    api_overrides:
      projects-bulk_create_job:
        skip_fields:
        - projects[0].id
        - projects[0].type
    expected_status: 400
  pagination:
    limit: 5
    offset: 0
  patch_normal:
    api_overrides: {}
    body_overrides: {}
    # individual_only: []    # --api 指定時のみ実行する API（全実行時はスキップ）
    # data_comparison:       # 未設定時は post_normal.data_comparison にフォールバック
    #   enabled: true
    #   get_endpoints: {}
    expected_status: 200
  patterns:
  - auth
  - pagination
  - search
  - boundary
  - missing_required
  # - post_normal           # POST 正常系テスト（デフォルトOFF: --safe-post で確認付き実行推奨）
  post_normal:
    individual_only:    # --api 指定時のみ実行（全実行時はスキップ）
    - projects-bulk_update_job
    - projects-bulk_delete_job
    - members-bulk_update_job
    api_overrides:
      members-bulk_create_job:
        expected_status: 200
      projects-bulk_update_job:
        expected_status: 200
    body_overrides:
      members-bulk_create_job:
        authorities:
          is_accountant: false
          is_admin: false
          is_approver: false
          is_supplier_manager: false
          is_tax_document_editor: false
      members-bulk_update_job:
        id: "3ea94dd0-1487-46cc-af8c-713c45442460"
        name: "[APIテスト]更新済み従業員_20260309"
      projects-bulk_create_job:
        id: null
        type: null
      projects-bulk_update_job:
        id: 64e73281-426d-4026-9171-7d130ccf2f7b
        name: "[APIテスト]更新済みプロジェクト_20260309"
      projects-bulk_delete_job:
        id: 64e73281-426d-4026-9171-7d130ccf2f7b
    crud_sequence:
      enabled: false
      sequences:
        projects:
          create: projects-bulk_create_job
          update: projects-bulk_update_job
          delete: projects-bulk_delete_job
          list_endpoint: projects.json
          resource_key: projects
          id_field: id
    data_comparison:
      enabled: true
      get_endpoints:
        members/bulk_create_job.json: members.json
        members/bulk_update_job.json: members.json
        projects/bulk_create_job.json: projects.json
        projects/bulk_update_job.json: projects.json
        projects/bulk_delete_job.json: projects.json
      get_params:
        limit: 100
      job_polling:
        enabled: true
        max_wait_seconds: 30
        poll_interval_seconds: 3
        status_url_pattern: '{url_path}?job_id={job_id}'
      wait_after_post_seconds: 5
    expected_status: 200
  put_normal:
    api_overrides: {}
    body_overrides: {}
    # individual_only: []    # --api 指定時のみ実行する API（全実行時はスキップ）
    # data_comparison:       # 未設定時は post_normal.data_comparison にフォールバック
    #   enabled: true
    #   get_endpoints: {}
    expected_status: 200
  response_validation:
    enabled: true
    json_schema_check: true
    json_schema_skip_params: []
    pagination_count_check: true
    required_fields_check: true
  retry:
    delay: 1.0
    max_retries: 2
  search:
    overrides:
      department_id: 90980a77-cdab-4db8-b845-0ea3d27e1954
  timeout: 30
