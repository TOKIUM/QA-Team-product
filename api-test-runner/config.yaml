api:
  auth:
    token_env: API_KEY
    type: bearer
  base_url: https://dev.keihi.com/api/v2
custom_tests:
- expected_status: 200
  method: GET
  name: health-check
  url_path: payment_requests/reports
  use_auth: true
- expected_status: 200
  method: GET
  name: get-reports
  url_path: payment_requests/reports
  use_auth: true
- expected_status: 401
  method: GET
  name: get-reports-no-auth
  url_path: payment_requests/reports
  use_auth: false
- expected_status: 200
  method: GET
  name: get-reports-with-sort
  query_params:
    amount_from: 1000
  request_body:
    sort:
    - key: due_at
      order: asc
  url_path: payment_requests/reports
  use_auth: true
notification:
  slack:
    on_failure_only: true
    webhook_url: ''
output:
  json_indent: 4
  results_dir: results
stages:
  core:
    directories: ["."]
  expansion:
    directories: ["expansion"]
  invoicing:
    directories: ["invoicing"]
  dencho:
    directories: ["dencho"]
  all:
    directories: [".", "expansion", "invoicing", "dencho"]
test:
  path_params:
    data_set_id: "placeholder-uuid"
    id: "placeholder-uuid"
    saml_setting_id: "placeholder-uuid"
  boundary:
    api_overrides:
      groups:
        negative_expected_status: 500
        offset_negative_expected_status: 500
      members:
        overflow_expected_status: 200
      posts:
        zero_expected_status: 400
      projects:
        zero_expected_status: 400
    offset_large_expected_status: 200
    offset_large_value: 999999
    offset_negative_expected_status: 400
    overflow_expected_status: 400
  concurrency: 3
  crud_chain:
    api_overrides: {}
    delete_expected_status: 200
    delete_url_pattern: '{url_path}/{id}'
    enabled: false
    id_field: id
    post_expected_status: 200
    verify_delete_expected_status: 404
  delete_normal:
    api_overrides: {}
    # individual_only: []    # --api 指定時のみ実行する API（全実行時はスキップ）
    # data_comparison:       # 未設定時は post_normal.data_comparison にフォールバック
    #   enabled: true
    #   get_endpoints: {}
    expected_status: 200
  error_body_validation: true
  invalid_body:
    api_overrides: {}
    expected_status: 400
  methods:
  - GET
  - POST
  missing_required:
    api_overrides:
      projects-bulk_create_job:
        skip_fields:
        - projects[0].id
        - projects[0].type
    expected_status: 400
  pagination:
    limit: 5
    offset: 0
  patch_normal:
    api_overrides: {}
    body_overrides: {}
    # individual_only: []    # --api 指定時のみ実行する API（全実行時はスキップ）
    # data_comparison:       # 未設定時は post_normal.data_comparison にフォールバック
    #   enabled: true
    #   get_endpoints: {}
    expected_status: 200
  patterns:
  - auth
  - pagination
  - search
  - boundary
  - missing_required
  # - post_normal           # POST 正常系テスト（デフォルトOFF: --safe-post で確認付き実行推奨）
  post_normal:
    individual_only:    # --api 指定時のみ実行（全実行時はスキップ）
    - projects-bulk_update_job
    - projects-bulk_delete_job
    - members-bulk_update_job
    # expansion: 更新・削除系
    - groups-bulk_update_job
    - groups-bulk_delete_job
    - projects-bulk_assign_job
    - approval_flows-bulk_attach_job
    - category_visibility_preferences-bulk_update_job
    - generic_fields-data_set-placeholder-uuid-items-bulk_update_jobs
    - generic_fields-data_set-placeholder-uuid-items-bulk_delete_jobs
    - kernels-authentications-samls-placeholder-uuid-saml_accounts-import_jobs
    # invoicing: 更新系
    - kernels-suppliers-bulk_update_job
    - kernels-clients-companies-bulk_update_job
    api_overrides:
      members-bulk_create_job:
        expected_status: 200
      projects-bulk_update_job:
        expected_status: 200
    body_overrides:
      # === core ===
      members-bulk_create_job:
        authorities:
          is_accountant: false
          is_admin: false
          is_approver: false
          is_supplier_manager: false
          is_tax_document_editor: false
      members-bulk_update_job:
        id: "3ea94dd0-1487-46cc-af8c-713c45442460"
        name: "[APIテスト]更新済み従業員_{NOW}"
      projects-bulk_create_job:
        id: null
        type: null
      projects-bulk_update_job:
        id: 68fe7d49-2369-4aae-b1a0-1bf7e9b77e04
        name: "[APIテスト]更新済みプロジェクト_{NOW}"
      projects-bulk_delete_job:
        id: 64e73281-426d-4026-9171-7d130ccf2f7b
      # === expansion ===
      projects-bulk_assign_job:
        id: "placeholder-uuid"
        post_id: "placeholder-uuid"
        user_ids: ["placeholder-uuid"]
      approval_flows-bulk_attach_job:
        ids: ["placeholder-uuid"]
        user_ids: ["placeholder-uuid"]
        request_type_id: "placeholder-uuid"
      groups-bulk_create_job:
        name: "[APIテスト]テスト部署_{NOW}"
      groups-bulk_update_job:
        id: "placeholder-uuid"
      groups-bulk_delete_job:
        id: "placeholder-uuid"
      category_visibility_preferences-bulk_update_job:
        user_id: "placeholder-uuid"
        category_id: "placeholder-uuid"
      generic_fields-data_set-placeholder-uuid-items-bulk_create_jobs:
        name: "[APIテスト]テスト選択肢_{NOW}"
        code: "api_test_code"
      generic_fields-data_set-placeholder-uuid-items-bulk_update_jobs:
        id: "placeholder-uuid"
        name: "[APIテスト]更新済み選択肢_{NOW}"
        code: "api_test_updated"
      generic_fields-data_set-placeholder-uuid-items-bulk_delete_jobs:
        id: "placeholder-uuid"
      kernels-authentications-samls-placeholder-uuid-saml_accounts-import_jobs:
        id: "placeholder-uuid"
      # === invoicing ===
      kernels-suppliers-bulk_create_job:
        supplier_name: "[APIテスト]テスト取引先_{NOW}"
        payment_method_type: "bank_transfer"
      kernels-suppliers-bulk_update_job:
        id: "placeholder-uuid"
        supplier_name: "[APIテスト]更新済み取引先_{NOW}"
        payment_method_type: "bank_transfer"
      kernels-clients-companies-bulk_create_job:
        code: "api_test_001"
        first_display_name: "[APIテスト]テスト企業_{NOW}"
        business_partner_type: "external"
        business_owner_type: "corporation"
      kernels-clients-companies-bulk_update_job:
        id: "placeholder-uuid"
        first_display_name: "[APIテスト]更新済み企業_{NOW}"
      # === dencho ===
      td-tax_documents:
        mimetype: "application/pdf"
        original_filename: "api_test_document.pdf"
        document_type: "receipt"
        name: "[APIテスト]テスト書類_{NOW}"
        transacted_at: "2026-01-01"
        supplier_name: "[APIテスト]テスト取引先"
    crud_sequence:
      enabled: false
      sequences:
        projects:
          create: projects-bulk_create_job
          update: projects-bulk_update_job
          delete: projects-bulk_delete_job
          list_endpoint: projects.json
          resource_key: projects
          id_field: id
    data_comparison:
      enabled: true
      get_endpoints:
        members/bulk_create_job.json: members.json
        members/bulk_update_job.json: members.json
        projects/bulk_create_job.json: projects.json
        projects/bulk_update_job.json: projects.json
        projects/bulk_delete_job.json: projects.json
      get_params:
        limit: 100
      job_polling:
        enabled: true
        max_wait_seconds: 30
        poll_interval_seconds: 3
        status_url_pattern: '{url_path}?job_id={job_id}'
      wait_after_post_seconds: 5
    expected_status: 200
  put_normal:
    api_overrides: {}
    body_overrides: {}
    # individual_only: []    # --api 指定時のみ実行する API（全実行時はスキップ）
    # data_comparison:       # 未設定時は post_normal.data_comparison にフォールバック
    #   enabled: true
    #   get_endpoints: {}
    expected_status: 200
  response_validation:
    enabled: true
    json_schema_check: true
    json_schema_skip_params: []
    pagination_count_check: true
    required_fields_check: true
  retry:
    delay: 1.0
    max_retries: 2
  search:
    overrides:
      department_id: ac8a3fd1-bc9e-4b1e-8b2d-26f409022af4
  timeout: 30
