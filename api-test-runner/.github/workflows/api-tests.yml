name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"  # 毎日 UTC 0:00（JST 9:00）に定期実行
  workflow_dispatch:
    inputs:
      include_post_normal:
        description: "POST 正常系テスト (post_normal) を含める"
        required: false
        type: boolean
        default: false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine test patterns
        id: patterns
        run: |
          if [ "${{ inputs.include_post_normal }}" = "true" ]; then
            echo "value=auth,pagination,search,boundary,missing_required,post_normal" >> "$GITHUB_OUTPUT"
          else
            echo "value=auth,pagination,search,boundary,missing_required" >> "$GITHUB_OUTPUT"
          fi

      - name: Run API tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python -m api_test_runner run --pattern "${{ steps.patterns.outputs.value }}"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: results/
