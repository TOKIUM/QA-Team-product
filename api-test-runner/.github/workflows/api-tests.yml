name: API Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "api-test-runner/**"
  # schedule:
  #   - cron: "0 0 * * *"  # 毎日 UTC 0:00（JST 9:00）に定期実行
  workflow_dispatch:
    inputs:
      include_write_tests:
        description: "書き込み系テスト (POST/PUT/DELETE/PATCH) を含める"
        required: false
        type: boolean
        default: false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-web.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine test patterns
        id: patterns
        run: |
          BASE="auth,pagination,search,boundary,missing_required"
          if [ "${{ inputs.include_write_tests }}" = "true" ]; then
            echo "value=${BASE},post_normal,put_normal,delete_normal,patch_normal" >> "$GITHUB_OUTPUT"
          else
            echo "value=${BASE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run API tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python -m api_test_runner run --pattern "${{ steps.patterns.outputs.value }}"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: results/
